<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 | 华北体博会</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-body { background: #f5f7fa; min-height: 100vh; font-family: var(--font-body, 'Rajdhani', sans-serif); color: #333; }
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        
        .login-box {
            max-width: 400px; margin: 160px auto; background: #fff;
            border: 1px solid #e8ecf0; border-radius: 16px; padding: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .login-box h2 { color: var(--color-text-primary); font-family: var(--font-display); text-align: center; margin-bottom: 8px; }
        .login-box p { color: var(--color-text-muted); text-align: center; margin-bottom: 30px; }
        
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 30px; background: #fff;
            border-bottom: 1px solid #e8ecf0; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .admin-header h1 { color: var(--color-text-primary); font-size: 20px; font-family: var(--font-display); margin: 0; }
        .admin-header h1 span { color: var(--color-green); }
        
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .stat-card {
            background: #fff; border: 1px solid #e8ecf0;
            border-radius: 12px; padding: 24px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .stat-card .stat-number { font-size: 32px; font-weight: 700; color: var(--color-green); font-family: var(--font-display); }
        .stat-card .stat-label { color: var(--color-text-secondary); font-size: 14px; margin-top: 4px; }
        .stat-card .stat-sub { color: #999; font-size: 12px; margin-top: 2px; }
        .stat-card.blue .stat-number { color: var(--color-primary-blue); }
        
        .admin-tabs {
            display: flex; gap: 0; margin-bottom: 24px;
            background: #fff; border-radius: 10px;
            border: 1px solid #e8ecf0; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .admin-tab {
            flex: 1; padding: 12px 20px; text-align: center; cursor: pointer;
            color: var(--color-text-muted); font-size: 16px; font-weight: 600;
            transition: all var(--transition-fast); border: none; background: none;
        }
        .admin-tab:hover { color: var(--color-text-primary); background: #f8f9fb; }
        .admin-tab.active { color: var(--color-green); background: var(--color-green-light, #e6f9f5); }
        .admin-tab .badge {
            display: inline-block; margin-left: 8px; padding: 2px 10px;
            border-radius: 20px; font-size: 12px; background: #f0f0f0; color: var(--color-text-muted);
        }
        .admin-tab.active .badge { background: var(--color-green); color: #fff; }
        
        .admin-panel { display: none; }
        .admin-panel.active { display: block; }
        
        .toolbar {
            display: flex; justify-content: space-between; align-items: center; gap: 16px;
            margin-bottom: 16px; flex-wrap: wrap;
        }
        .search-box {
            display: flex; gap: 8px; align-items: center;
            background: #fff; border: 1px solid #e0e4e8;
            border-radius: 8px; padding: 4px 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }
        .search-box input {
            background: none; border: none; color: #333; padding: 8px 4px;
            outline: none; min-width: 220px; font-size: 14px;
        }
        .search-box input::placeholder { color: #bbb; }
        .search-box button {
            background: none; border: none; color: #999; cursor: pointer; padding: 4px;
        }
        .search-box button:hover { color: var(--color-green); }
        
        .table-card {
            background: #fff; border-radius: 12px; border: 1px solid #e8ecf0;
            overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            padding: 12px 16px; text-align: left; font-size: 13px;
            color: var(--color-text-muted); background: #fafbfc;
            border-bottom: 1px solid #e8ecf0; font-weight: 600; white-space: nowrap;
        }
        .data-table td {
            padding: 12px 16px; color: var(--color-text-primary); font-size: 15px;
            border-bottom: 1px solid #f0f2f4; vertical-align: middle; background: #fff;
        }
        .data-table tr:hover td { background: #f8f9fb; }
        
        .status-badge {
            display: inline-block; padding: 3px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }
        .status-1 { background: var(--color-green-light, #e6f9f5); color: var(--color-green); }
        .status-2 { background: var(--color-primary-blue-light, #e3f2fd); color: var(--color-primary-blue); }
        .status-3 { background: #fff8e1; color: #f57f17; }
        
        .table-actions { display: flex; gap: 6px; align-items: center; }
        .table-actions button {
            padding: 5px 10px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 12px; transition: all var(--transition-fast);
        }
        .btn-view { background: var(--color-primary-blue-light, #e3f2fd); color: var(--color-primary-blue); }
        .btn-view:hover { background: #bbdefb; }
        .btn-delete { background: #ffebee; color: #e53935; }
        .btn-delete:hover { background: #ffcdd2; }
        
        .pagination {
            display: flex; justify-content: center; gap: 6px; padding: 16px;
        }
        .pagination button {
            padding: 6px 14px; border: 1px solid #e0e4e8; border-radius: 6px;
            background: #fff; color: var(--color-text-secondary); cursor: pointer;
            transition: all var(--transition-fast); font-size: 14px;
        }
        .pagination button:hover { border-color: var(--color-green); color: var(--color-green); }
        .pagination button.active { background: var(--color-green); color: #fff; border-color: var(--color-green); }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; background: #f8f9fb; }
        
        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #fff; border-radius: 16px; max-width: 700px; width: 90%; max-height: 80vh;
            overflow-y: auto; padding: 30px; box-shadow: 0 8px 40px rgba(0,0,0,0.12);
        }
        .modal-box h3 { color: var(--color-text-primary); font-family: var(--font-display); margin-bottom: 20px;
            font-size: 18px; }
        .modal-box .close-btn {
            float: right; background: none; border: none; color: #999;
            font-size: 28px; cursor: pointer; line-height: 1;
        }
        .modal-box .close-btn:hover { color: #333; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .detail-item { padding: 12px 0; border-bottom: 1px solid #f0f2f4; }
        .detail-item .label { color: var(--color-text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-item .value { color: var(--color-text-primary); margin-top: 4px; font-size: 15px; font-weight: 500; word-break: break-all; }
        .detail-item.full { grid-column: 1 / -1; }
        
        .status-select {
            background: #fff; border: 1px solid #e0e4e8;
            color: #333; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
        }
        .status-select:focus { border-color: var(--color-green); outline: none; }

        .logout-btn {
            background: none; border: 1px solid #e0e4e8;
            color: var(--color-text-secondary); padding: 8px 20px; border-radius: 8px;
            cursor: pointer; font-size: 14px; transition: all var(--transition-fast); 
        }
        .logout-btn:hover { color: #e53935; border-color: #e53935; background: #fff5f5; }

        .toast-admin {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600;
            transition: all 0.3s; opacity: 0; transform: translateY(-10px);
        }
        .toast-admin.show { opacity: 1; transform: translateY(0); }
        .toast-admin.success { background: var(--color-green); color: #fff; }
        .toast-admin.error { background: #e53935; color: #fff; }
    </style>
</head>
<body class="admin-body">
    <div id="toast" class="toast-admin"></div>

    <!-- 登录页 -->
    <div id="login-page">
        <div class="login-box">
            <h2>NCISHE</h2>
            <p>后台管理系统</p>
            <div class="mb-3">
                <input type="password" id="admin-password" class="form-control" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')login()">
            </div>
            <button class="btn btn-primary w-100" onclick="login()">登 录</button>
        </div>
    </div>

    <!-- 主面板 -->
    <div id="admin-main" style="display:none;">
        <div class="admin-header">
            <h1>NCISHE <span>后台</span></h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>退出登录</button>
        </div>

        <div class="admin-container">
            <!-- 统计 -->
            <div class="stats-row" id="stats-row">
                <div class="stat-card">
                    <div class="stat-number" id="stat-visitor-total">0</div>
                    <div class="stat-label">观展预约总数</div>
                    <div class="stat-sub" id="stat-visitor-today">今日 0</div>
                </div>
                <div class="stat-card blue">
                    <div class="stat-number" id="stat-exhibitor-total">0</div>
                    <div class="stat-label">参展报名总数</div>
                    <div class="stat-sub" id="stat-exhibitor-today">今日 0</div>
                </div>
            </div>

            <!-- 选项卡 -->
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="visitor" onclick="switchTab('visitor')">
                    <i class="fas fa-users me-1"></i> 观展预约 <span class="badge" id="visitor-tab-count">0</span>
                </button>
                <button class="admin-tab" data-tab="exhibitor" onclick="switchTab('exhibitor')">
                    <i class="fas fa-building me-1"></i> 参展报名 <span class="badge" id="exhibitor-tab-count">0</span>
                </button>
            </div>

            <!-- 观展预约 -->
            <div class="admin-panel active" id="panel-visitor">
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" id="visitor-search" placeholder="搜索姓名/手机/公司..." onkeydown="if(event.key==='Enter')loadVisitor(1)">
                        <button onclick="loadVisitor(1)"><i class="fas fa-search"></i></button>
                    </div>
                    <span style="color:var(--color-text-muted);font-size:13px;" id="visitor-total-label">共 0 条</span>
                </div>
                <div class="table-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th><th>姓名</th><th>手机</th><th>公司</th><th>观展日期</th>
                            <th>人数</th><th>状态</th><th>提交时间</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="visitor-table-body">
                        <tr><td colspan="9" style="text-align:center;color:var(--color-text-muted);padding:40px;">暂无数据</td></tr>
                    </tbody>
                </table>
                <div class="pagination" id="visitor-pagination"></div>
                </div>
            </div>

            <!-- 参展报名 -->
            <div class="admin-panel" id="panel-exhibitor">
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" id="exhibitor-search" placeholder="搜索姓名/手机/公司..." onkeydown="if(event.key==='Enter')loadExhibitor(1)">
                        <button onclick="loadExhibitor(1)"><i class="fas fa-search"></i></button>
                    </div>
                    <span style="color:var(--color-text-muted);font-size:13px;" id="exhibitor-total-label">共 0 条</span>
                </div>
                <div class="table-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th><th>联系人</th><th>手机</th><th>公司</th><th>展位类型</th>
                            <th>面积</th><th>状态</th><th>提交时间</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="exhibitor-table-body">
                        <tr><td colspan="9" style="text-align:center;color:var(--color-text-muted);padding:40px;">暂无数据</td></tr>
                    </tbody>
                </table>
                <div class="pagination" id="exhibitor-pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal-box">
            <button class="close-btn" onclick="closeDetail()">&times;</button>
            <h3 id="detail-title">详情</h3>
            <div id="detail-content" class="detail-grid"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let TOKEN = localStorage.getItem('admin_token') || '';
        let currentTab = 'visitor';
        let visitorPage = 1, exhibitorPage = 1;

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast-admin ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function api(url, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
            const res = await fetch(API_BASE + url, { ...options, headers });
            return res.json();
        }

        // 登录
        async function login() {
            const pw = document.getElementById('admin-password').value;
            if (!pw) return showToast('请输入密码', 'error');
            const res = await api('/admin/login', { method: 'POST', body: JSON.stringify({ password: pw }) });
            if (res.code === 1) {
                TOKEN = res.data.token;
                localStorage.setItem('admin_token', TOKEN);
                showToast('登录成功');
                initAdmin();
            } else {
                showToast(res.msg, 'error');
            }
        }

        function logout() {
            TOKEN = '';
            localStorage.removeItem('admin_token');
            document.getElementById('admin-main').style.display = 'none';
            document.getElementById('login-page').style.display = 'block';
        }

        // 初始化管理面板
        async function initAdmin() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('admin-main').style.display = 'block';
            await loadStats();
            await loadVisitor(1);
            await loadExhibitor(1);
        }

        // 加载统计数据
        async function loadStats() {
            const res = await api('/admin/stats');
            if (res.code === 1) {
                document.getElementById('stat-visitor-total').textContent = res.data.visitorTotal;
                document.getElementById('stat-exhibitor-total').textContent = res.data.exhibitorTotal;
                document.getElementById('stat-visitor-today').textContent = '今日 ' + res.data.visitorToday;
                document.getElementById('stat-exhibitor-today').textContent = '今日 ' + res.data.exhibitorToday;
                document.getElementById('visitor-tab-count').textContent = res.data.visitorTotal;
                document.getElementById('exhibitor-tab-count').textContent = res.data.exhibitorTotal;
            }
        }

        // 切换选项卡
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.querySelectorAll('.admin-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
        }

        // 加载观展预约
        async function loadVisitor(page) {
            visitorPage = page;
            const keyword = document.getElementById('visitor-search').value;
            const res = await api('/admin/visitor/list?page=' + page + '&size=15&keyword=' + encodeURIComponent(keyword));
            if (res.code !== 1) return;
            const { list, total } = res.data;
            document.getElementById('visitor-total-label').textContent = '共 ' + total + ' 条';
            renderVisitorTable(list);
            renderPagination('visitor-pagination', total, page, 'loadVisitor');
        }

        // 渲染观展预约表格
        function renderVisitorTable(list) {
            const tbody = document.getElementById('visitor-table-body');
            if (!list || list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--color-text-muted);padding:40px;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = list.map(item => `
                <tr>
                    <td>${item.id}</td>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.phone}</td>
                    <td>${item.company || '-'}</td>
                    <td>${item.visit_date || '-'}</td>
                    <td>${item.visit_count || '-'}</td>
                    <td>${renderStatus(item.status)}</td>
                    <td style="font-size:13px;color:var(--color-text-muted);">${item.created_at}</td>
                    <td>
                        <div class="table-actions">
                            <button class="btn-view" onclick="viewDetail('visitor',${item.id})"><i class="fas fa-eye"></i></button>
                            <select class="status-select" onchange="updateStatus('visitor',${item.id},this.value)">
                                <option value="1" ${item.status==1?'selected':''}>已提交</option>
                                <option value="2" ${item.status==2?'selected':''}>已联系</option>
                                <option value="3" ${item.status==3?'selected':''}>已完成</option>
                            </select>
                            <button class="btn-delete" onclick="deleteRecord('visitor',${item.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 加载参展报名
        async function loadExhibitor(page) {
            exhibitorPage = page;
            const keyword = document.getElementById('exhibitor-search').value;
            const res = await api('/admin/exhibitor/list?page=' + page + '&size=15&keyword=' + encodeURIComponent(keyword));
            if (res.code !== 1) return;
            const { list, total } = res.data;
            document.getElementById('exhibitor-total-label').textContent = '共 ' + total + ' 条';
            renderExhibitorTable(list);
            renderPagination('exhibitor-pagination', total, page, 'loadExhibitor');
        }

        // 渲染参展报名表格
        function renderExhibitorTable(list) {
            const tbody = document.getElementById('exhibitor-table-body');
            if (!list || list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--color-text-muted);padding:40px;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = list.map(item => `
                <tr>
                    <td>${item.id}</td>
                    <td><strong>${item.contact_name}</strong></td>
                    <td>${item.phone}</td>
                    <td>${item.company || '-'}</td>
                    <td>${item.booth_type || '-'}</td>
                    <td>${item.exhibit_area || '-'}</td>
                    <td>${renderStatus(item.status)}</td>
                    <td style="font-size:13px;color:var(--color-text-muted);">${item.created_at}</td>
                    <td>
                        <div class="table-actions">
                            <button class="btn-view" onclick="viewDetail('exhibitor',${item.id})"><i class="fas fa-eye"></i></button>
                            <select class="status-select" onchange="updateStatus('exhibitor',${item.id},this.value)">
                                <option value="1" ${item.status==1?'selected':''}>已提交</option>
                                <option value="2" ${item.status==2?'selected':''}>已联系</option>
                                <option value="3" ${item.status==3?'selected':''}>已签约</option>
                            </select>
                            <button class="btn-delete" onclick="deleteRecord('exhibitor',${item.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderStatus(status) {
            const labels = { 1: '已提交', 2: '已联系', 3: '已完成' };
            const extLabels = { 1: '已提交', 2: '已联系', 3: '已签约' };
            const label = currentTab === 'exhibitor' ? extLabels[status] : labels[status];
            return `<span class="status-badge status-${status}">${label || '未知'}</span>`;
        }

        // 分页
        function renderPagination(containerId, total, current, fn) {
            const container = document.getElementById(containerId);
            const totalPages = Math.ceil(total / 15);
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = `<button ${current<=1?'disabled':''} onclick="${fn}(${current-1})"><i class="fas fa-chevron-left"></i></button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || Math.abs(i - current) <= 2) {
                    html += `<button class="${i===current?'active':''}" onclick="${fn}(${i})">${i}</button>`;
                } else if (i === current - 3 || i === current + 3) {
                    html += `<button disabled>...</button>`;
                }
            }
            html += `<button ${current>=totalPages?'disabled':''} onclick="${fn}(${current+1})"><i class="fas fa-chevron-right"></i></button>`;
            container.innerHTML = html;
        }

        // 查看详情
        async function viewDetail(type, id) {
            const res = await api('/admin/' + type + '/detail/' + id);
            if (res.code !== 1) return showToast(res.msg, 'error');
            const d = res.data;
            
            if (type === 'visitor') {
                document.getElementById('detail-title').textContent = '观展预约详情 #' + d.id;
                document.getElementById('detail-content').innerHTML = `
                    ${renderDetailItem('姓名', d.name)}
                    ${renderDetailItem('手机', d.phone)}
                    ${renderDetailItem('邮箱', d.email)}
                    ${renderDetailItem('所在城市', d.city || '-')}
                    ${renderDetailItem('公司名称', d.company)}
                    ${renderDetailItem('职位', d.position)}
                    ${renderDetailItem('观众类型', d.visitor_type || '-')}
                    ${renderDetailItem('意向往期', d.visit_date || '-')}
                    ${renderDetailItem('参观人数', d.visit_count || '-')}
                    ${renderDetailItem('感兴趣的展区', Array.isArray(d.interest) ? d.interest.join('、') : (d.interest || '-'), true)}
                    ${renderDetailItem('备注信息', d.message || '-', true)}
                    ${renderDetailItem('状态', ['已提交','已联系','已完成'][d.status-1] || '-')}
                    ${renderDetailItem('提交时间', d.created_at)}
                `;
            } else {
                document.getElementById('detail-title').textContent = '参展报名详情 #' + d.id;
                document.getElementById('detail-content').innerHTML = `
                    ${renderDetailItem('联系人', d.contact_name)}
                    ${renderDetailItem('手机', d.phone)}
                    ${renderDetailItem('邮箱', d.email)}
                    ${renderDetailItem('公司名称', d.company)}
                    ${renderDetailItem('品牌名称', d.brand || '-')}
                    ${renderDetailItem('公司网址', d.website || '-')}
                    ${renderDetailItem('首次参展', d.is_first === 'yes' ? '是' : (d.is_first === 'no' ? '否' : '-'))}
                    ${renderDetailItem('展位类型', d.booth_type || '-')}
                    ${renderDetailItem('展位面积', d.exhibit_area || '-')}
                    ${renderDetailItem('参展类别', d.exhibit_type || '-')}
                    ${renderDetailItem('增值服务', Array.isArray(d.services) ? d.services.join('、') : (d.services || '-'), true)}
                    ${renderDetailItem('主营产品', d.products || '-', true)}
                    ${renderDetailItem('展位需求', d.booth_requirements || '-', true)}
                    ${renderDetailItem('状态', ['已提交','已联系','已签约'][d.status-1] || '-')}
                    ${renderDetailItem('提交时间', d.created_at)}
                `;
            }
            document.getElementById('detail-modal').classList.add('show');
        }

        function renderDetailItem(label, value, full) {
            return `<div class="detail-item${full?' full':''}"><div class="label">${label}</div><div class="value">${value}</div></div>`;
        }

        function closeDetail() {
            document.getElementById('detail-modal').classList.remove('show');
        }

        // 更新状态
        async function updateStatus(type, id, status) {
            const res = await api('/admin/' + type + '/status/' + id, {
                method: 'PUT', body: JSON.stringify({ status: parseInt(status) })
            });
            if (res.code === 1) {
                showToast('状态更新成功');
                if (type === 'visitor') loadVisitor(visitorPage);
                else loadExhibitor(exhibitorPage);
                loadStats();
            } else {
                showToast(res.msg, 'error');
            }
        }

        // 删除记录
        async function deleteRecord(type, id) {
            if (!confirm('确认删除这条记录吗？此操作不可恢复。')) return;
            const res = await api('/admin/' + type + '/delete/' + id, { method: 'DELETE' });
            if (res.code === 1) {
                showToast('删除成功');
                if (type === 'visitor') loadVisitor(visitorPage);
                else loadExhibitor(exhibitorPage);
                loadStats();
            } else {
                showToast(res.msg, 'error');
            }
        }

        // 自动登录
        document.addEventListener('DOMContentLoaded', () => {
            if (TOKEN) {
                initAdmin();
            }
        });
    </script>
</body>
</html>
